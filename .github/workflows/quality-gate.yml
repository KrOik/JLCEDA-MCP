name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - mcp-hub
          - mcp-bridge
    defaults:
      run:
        shell: powershell
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build
